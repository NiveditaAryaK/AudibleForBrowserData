<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quick Browser Reader Settings</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="card">
      <h1>API settings</h1>
      <p class="subtle">Use localhost for your machine, or your deployed Vercel API for everyone.</p>
      <label class="field" for="apiBaseUrl">Base URL</label>
      <input id="apiBaseUrl" type="url" placeholder="https://your-project.vercel.app/api" />
      <div class="actions">
        <button id="save">Save</button>
        <button id="reset" class="secondary">Use localhost</button>
      </div>
      <p id="status" class="status">Ready.</p>
    </main>
    <script src="options.js"></script>
  </body>
</html>
